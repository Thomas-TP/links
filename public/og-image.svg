<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="blob1" cx="20%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="80%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="avatarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#09090b"/>
  <rect width="1200" height="630" fill="url(#blob1)"/>
  <rect width="1200" height="630" fill="url(#blob2)"/>

  <!-- Outer frame -->
  <rect x="32" y="32" width="1136" height="566" rx="28" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Vertical separator line -->
  <line x1="820" y1="80" x2="820" y2="550" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- ─── Left content ─── -->

  <!-- Avatar glow -->
  <ellipse cx="160" cy="190" rx="70" ry="70" fill="url(#avatarGlow)"/>

  <!-- Avatar circle -->
  <circle cx="160" cy="190" r="52" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- "TP" initials -->
  <text x="160" y="204" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="700" fill="rgba(255,255,255,0.85)">TP</text>

  <!-- Name -->
  <text x="100" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="58" font-weight="700" fill="white" letter-spacing="-1.5">Thomas Prud&apos;homme</text>

  <!-- Subtitle -->
  <text x="100" y="368" font-family="system-ui,-apple-system,sans-serif" font-size="30" font-weight="400" fill="rgba(255,255,255,0.55)">Apprenti CFC Informaticien</text>

  <!-- Detail line -->
  <text x="100" y="408" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="rgba(255,255,255,0.3)">Exploitation &amp; Infrastructure  ·  2&#232;me ann&#233;e</text>

  <!-- Divider -->
  <line x1="100" y1="438" x2="700" y2="438" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Location badge -->
  <rect x="100" y="456" width="226" height="38" rx="19" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <circle cx="124" cy="475" r="5" fill="rgba(255,255,255,0.3)"/>
  <text x="138" y="481" font-family="system-ui,-apple-system,sans-serif" font-size="17" fill="rgba(255,255,255,0.45)">Arc l&#233;manique, Suisse</text>

  <!-- Available badge -->
  <rect x="342" y="456" width="278" height="38" rx="19" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <circle cx="366" cy="475" r="5" fill="#10b981"/>
  <text x="380" y="481" font-family="system-ui,-apple-system,sans-serif" font-size="17" fill="rgba(16,185,129,0.8)">Disponible d&#232;s juillet 2026</text>

  <!-- URL watermark -->
  <text x="100" y="568" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="rgba(255,255,255,0.18)">links.thomastp.ch</text>

  <!-- ─── Right decoration — star field ─── -->
  <!-- Large stars -->
  <circle cx="900" cy="145" r="2.8" fill="rgba(255,255,255,0.7)"/>
  <circle cx="1050" cy="185" r="2.2" fill="rgba(255,255,255,0.6)"/>
  <circle cx="975" cy="265" r="3" fill="rgba(255,255,255,0.65)"/>
  <circle cx="1110" cy="310" r="2.5" fill="rgba(255,255,255,0.55)"/>
  <circle cx="870" cy="380" r="2.8" fill="rgba(255,255,255,0.6)"/>
  <circle cx="1060" cy="420" r="2.2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="940" cy="480" r="2.5" fill="rgba(255,255,255,0.55)"/>
  <!-- Small stars -->
  <circle cx="850" cy="200" r="1.5" fill="rgba(255,255,255,0.35)"/>
  <circle cx="930" cy="230" r="1.2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="1000" cy="160" r="1.8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="1080" cy="240" r="1.3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="1140" cy="170" r="1.5" fill="rgba(255,255,255,0.35)"/>
  <circle cx="1130" cy="400" r="1.8" fill="rgba(255,255,255,0.3)"/>
  <circle cx="890" cy="320" r="1.2" fill="rgba(255,255,255,0.25)"/>
  <circle cx="1020" cy="350" r="1.5" fill="rgba(255,255,255,0.35)"/>
  <circle cx="1090" cy="490" r="1.3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="960" cy="540" r="1.5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="850" cy="465" r="1.2" fill="rgba(255,255,255,0.2)"/>
  <circle cx="1150" cy="520" r="1.8" fill="rgba(255,255,255,0.3)"/>
  <!-- Purple-tinted glow stars -->
  <circle cx="975" cy="265" r="8" fill="rgba(124,58,237,0.15)"/>
  <circle cx="870" cy="380" r="7" fill="rgba(124,58,237,0.12)"/>
  <circle cx="1050" cy="185" r="6" fill="rgba(6,182,212,0.12)"/>

  <!-- Constellation lines -->
  <line x1="900" y1="145" x2="1050" y2="185" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="1050" y1="185" x2="975" y2="265" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="975" y1="265" x2="1110" y2="310" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="975" y1="265" x2="870" y2="380" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="870" y1="380" x2="1060" y2="420" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="1060" y1="420" x2="940" y2="480" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
</svg>
